<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PingPin Says...</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #fafafa; 
            text-align: center; 
            padding: 24px; 
        }
        .box { 
            background: #ffffff; 
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); 
            max-width: 360px; 
            width: 100%;
            border: 1px solid #eaeaea;
            box-sizing: border-box;
        }
        h1 { 
            font-size: 1.6rem; 
            color: #1a1a1a; 
            line-height: 1.5; 
            margin: 0;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1 id="answer">...</h1>
    </div>

    <script>
        const answers = [
            "Bawal ngani mag-gastos. Ibalik mo 'yang wallet mo. 🛑",
            "Tinatanong mo pa talaga ako? Alam mo naman ang tamang sagot. 🤔",
            "Teh, itulog mo lang 'yan. Pagod lang 'yan. 😴",
            "Option A, definitely. Huwag mo nang pilitin 'yung isa. ✨",
            "Grabe, ang tapang natin ngayon ah? Drop it. No. 💀",
            "Heto na naman tayo sa marupok eras natin. Isang malaking HINDI. ❌",
            "Don't look at me, hindi ko rin alam bakit mo 'yan iniisip. 🤷‍♂️",
            "Parang hindi naman deserve. Try again tomorrow. 🙄",
            "Bukas mo na gawin. Ang tamang sagot ay mag-procrastinate muna. 🔄",
            "Pass muna tayo riyan, baka mapabili ka pa ng wala sa oras. 💸",
            "Pwede namang 'wag na lang? Sayang effort, gurl. 💅",
            "HINDI. 'Yung totoo, kailangan mo ba talaga 'yan? 🧐",
            "Sige na, gawin mo na. Para magka-alaman na agad kung iiyak ka o hindi. 😂",
            "Short answer: No. Long answer: Noooooooooo. 🛑",
            "Ay nako, stop overthinking at i-close mo na 'yang app. 📱",
            "Delete draft. Huwag mo nang i-send. Please lang. 🔥",
            "No. Red flag 'yan, mami. Takbo! 🚩",
            "Go lang, pero huwag ka iiyak sa akin pagkatapos ah? 🤫",
            "Huwag mo nang ipilit, hindi talaga para sa'yo 'yan ngayon. 💔",
            "Hard NO. Protect your peace naman today, kahit ngayon lang. 🕊️",
            "Mag-cancel ka na ng attendance. Manahimik ka na lang sa bahay. 🏠",
            "100% NO. Mag-ipon ka muna, please? 🪙",
            "Sige na nga, gawin mo na. Pero last mo na 'yan ah! 😤",
            "Kung sign ang hinahanap mo, ito na 'yun: HUWAG. ⚠️",
            "Masyado ka nang madaming iniisip, huwag mo na 'tong idagdag. 🤯",
            "Deserve mo naman! Go for it, proud ako sa'yo. 🎉",
            "Treat yourself today. Medyo mabigat ang linggong 'to, eh. 🫂",
            "Go ahead, love! You've worked so hard for this. 🥰",
            "Breathe in, breathe out. Ang sagot ay magpahinga ka muna. 🍃",
            "Clear YES! Deserve mo maging masaya today. ✨",
            "Pwede naman! Walang masama kung susubukan mo. 🚀",
            "Piliin mo naman kung saan ka mas sasaya. Go for it! 💖",
            "Yes, and text your friends too. Miss ka na nila. 📱",
            "Oo naman, ikaw pa ba? Kaya mo 'yan! 💪",
            "Sipit ng kape muna bago mag-decide, pero friendly yes! ☕",
            "Sobrang deserve! I-add to cart mo na 'yan. 🛒",
            "Deserve mo mag-kape today. Libre kita sa isip ko. ☕",
            "Go for Option B. Ramdam ko, 'yan ang mas magpapasaya sa'yo. 🔮",
            "Slow down, okay lang naman mag-skip ng isang araw. 🛌",
            "Isang malaking YES. Trust your gut this time. 💯",
            "Take a break. Valid naman na mapagod ka. 🤍",
            "Ang sagot ay: Yakap! Kakayanin mo ang araw na 'to. 🫂",
            "Smile muna bago mo gawin. Pero yes ang sagot! 😊",
            "Pwede naman ngayon, basta bawi ka na lang bukas. 🌅",
            "Go ahead, you are doing amazing sweetie! 💅",
            "Yes! You've got nothing to lose anyway. 🌟",
            "Deserve mo mag-relax muna ngayon. Hayaan mo muna sila. 🍹",
            "Manifesting good vibes for you, kaya go na! 🍀",
            "Pwede namang oo, basta promise me hindi mo mamasamain ang outcome. 🤝",
            "Choice mo 'yan, at valid 'yan. Suportahan kita! 👑"
        ];

        const randomAnswer = answers[Math.floor(Math.random() * answers.length)];
        document.getElementById("answer").innerText = randomAnswer;
    </script>
</body>
</html>
